spring.application.name=todo-backend
server.port=8080

# H2 file-based database - data persists between restarts in backend/data/
spring.datasource.url=jdbc:h2:file:./data/tododb;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Visit http://localhost:8080/h2-console while the app is running to inspect data
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
