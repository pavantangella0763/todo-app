<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Field Notes — Todo</title>
<meta name="description" content="A simple daily todo list for your pocket." />
<meta name="theme-color" content="#1B1F2A" />

<link rel="manifest" href="manifest.json" />
<link rel="icon" href="icon-192.png" />
<link rel="apple-touch-icon" href="icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Field Notes" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,440;9..144,560&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
  rel="stylesheet"
/>
<link rel="stylesheet" href="styles.css" />
</head>
<body>

<div class="app">
  <header class="header">
    <p class="eyebrow">Field Notes</p>
    <h1 class="greeting" id="greeting">Good evening.</h1>
    <p class="meta" id="meta">···</p>
  </header>

  <main class="list" id="list" aria-live="polite"></main>
</div>

<form class="composer" id="composer">
  <div class="composer-pill">
    <input
      type="text"
      id="taskInput"
      class="composer-input"
      placeholder="Add a task…"
      autocomplete="off"
      maxlength="140"
      enterkeyhint="done"
    />
  </div>
  <button type="submit" class="composer-submit" aria-label="Add task" disabled>
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M5 12h14M13 6l6 6-6 6" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </button>
</form>

<script src="app.js"></script>
</body>
</html>
